<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Open Sans', sans-serif;
  background: #080c18;
  color: #e2e8f8;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(74,104,206,0.22) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 100%, rgba(129,173,243,0.10) 0%, transparent 60%);
}
.container {
  text-align: center;
  padding: 60px 40px;
  max-width: 560px;
}
.logo {
  height: 52px;
  width: auto;
  margin-bottom: 48px;
  opacity: 0.9;
}
h1 {
  font-size: 36px;
  font-weight: 800;
  color: #ffffff;
  margin-bottom: 12px;
  line-height: 1.2;
}
h1 span { color: #81ADF3; }
.subtitle {
  font-size: 16px;
  color: #6b7a9e;
  margin-bottom: 48px;
  line-height: 1.6;
}
.divider {
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #4A68CE, transparent);
  margin: 0 auto 48px;
}
.badge {
  display: inline-block;
  background: rgba(129,173,243,0.08);
  border: 1px solid rgba(129,173,243,0.18);
  color: #81ADF3;
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.5px;
  animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}
</style>
